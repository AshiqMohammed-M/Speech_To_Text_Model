<!doctype html>
<html>

<head>
  <title>Speech Recognition Demo</title>
  <meta charset="utf-8" />
  <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body,
    main {
      margin: 0;
      padding: 0;
      min-width: 100%;
      min-height: 100vh;
      font-family: sans-serif;
      text-align: center;
      color: #fff;
      background: #000;
    }

    button {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5em;
      height: 2em;
      margin-left: -2.5em;
      margin-top: -1em;
      z-index: 100;
      padding: .25em .5em;
      color: #fff;
      background: #000;
      border: 1px solid #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1.15em;
      font-weight: 200;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      transition: box-shadow .5s;
    }

    button:hover {
      box-shadow: 0 0 30px 5px rgba(255, 255, 255, 0.75);
    }

    main {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    main>div {
      display: inline-block;
      width: 3px;
      height: 100px;
      margin: 0 7px;
      background: currentColor;
      transform: scaleY(.5);
      opacity: .25;
    }

    main.error {
      color: #f7451d;
      min-width: 20em;
      max-width: 30em;
      margin: 0 auto;
      white-space: pre-line;
    }

    #transcript {
      position: fixed;
      top: 60%;
      width: 100vw;
      padding-left: 20vw;
      padding-right: 20vw;
      font-size: x-large;
    }
  </style>
</head>

<body>
  <main>
    <button onclick="init()">start</button>
  </main>
  <div id="transcript"></div>
</body>


<script>
  // WebSocket connection for streaming transcription
  let ws = null;
  let audioProcessor = null;
  let isRecording = false;

  class AudioVisualizer {
    constructor(audioContext, processFrame, processError, onStream) {
      this.audioContext = audioContext;
      this.processFrame = processFrame;
      this.onStream = onStream;
      this.connectStream = this.connectStream.bind(this);
      navigator.mediaDevices.getUserMedia({ audio: true, video: false })
        .then(this.connectStream)
        .catch((error) => {
          if (processError) {
            processError(error);
          }
        });
    }

    connectStream(stream) {
      this.stream = stream;
      this.analyser = this.audioContext.createAnalyser();
      const source = this.audioContext.createMediaStreamSource(stream);
      console.log(source);
      source.connect(this.analyser);
      this.analyser.smoothingTimeConstant = 0.5;
      this.analyser.fftSize = 32;

      this.initRenderLoop(this.analyser);

      // Callback for stream setup
      if (this.onStream) {
        this.onStream(stream, this.audioContext);
      }
    }

    initRenderLoop() {
      const frequencyData = new Uint8Array(this.analyser.frequencyBinCount);
      const processFrame = this.processFrame || (() => { });

      const renderFrame = () => {
        this.analyser.getByteFrequencyData(frequencyData);
        processFrame(frequencyData);

        requestAnimationFrame(renderFrame);
      };
      requestAnimationFrame(renderFrame);
    }
  }

  const visualMainElement = document.querySelector('main');
  const visualValueCount = 16;
  let visualElements;
  const createDOMElements = () => {
    let i;
    for (i = 0; i < visualValueCount; ++i) {
      const elm = document.createElement('div');
      visualMainElement.appendChild(elm);
    }

    visualElements = document.querySelectorAll('main div');
  };
  createDOMElements();

  const connectWebSocket = () => {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws/transcribe`;

    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      console.log('WebSocket connected');
      // Send config with sample rate
      ws.send(JSON.stringify({
        type: 'config',
        sample_rate: 48000
      }));
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      console.log('Received:', data);

      if (data.type === 'transcription') {
        const transcriptEl = document.getElementById('transcript');
        transcriptEl.innerHTML = data.full_text || data.text;
      } else if (data.type === 'error') {
        console.error('Server error:', data.message);
      }
    };

    ws.onerror = (error) => {
      console.error('WebSocket error:', error);
    };

    ws.onclose = () => {
      console.log('WebSocket disconnected');
      if (isRecording) {
        // Reconnect if still recording
        setTimeout(connectWebSocket, 1000);
      }
    };
  };

  const setupAudioStreaming = (stream, audioContext) => {
    // Create audio processor for streaming
    const source = audioContext.createMediaStreamSource(stream);
    const bufferSize = 4096;

    // Use ScriptProcessorNode (deprecated but widely supported)
    // For production, consider using AudioWorklet
    audioProcessor = audioContext.createScriptProcessor(bufferSize, 1, 1);

    audioProcessor.onaudioprocess = (e) => {
      if (ws && ws.readyState === WebSocket.OPEN && isRecording) {
        const inputData = e.inputBuffer.getChannelData(0);
        // Convert to Float32Array and send as binary
        const audioData = new Float32Array(inputData);
        ws.send(audioData.buffer);
      }
    };

    source.connect(audioProcessor);
    audioProcessor.connect(audioContext.destination);
  };

  const stopRecording = () => {
    isRecording = false;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'end' }));
    }

    // Update button
    const btn = document.querySelector('button');
    btn.textContent = 'start';
    btn.onclick = init;
  };

  const init = () => {
    isRecording = true;

    // Update button to stop
    const btn = document.querySelector('button');
    btn.textContent = 'stop';
    btn.onclick = stopRecording;

    // Creating initial DOM elements
    const audioContext = new AudioContext();
    const initDOM = () => {
      visualMainElement.innerHTML = '';
      createDOMElements();
    };
    initDOM();

    // Connect WebSocket
    connectWebSocket();

    // Swapping values around for a better visual effect
    const dataMap = { 0: 15, 1: 10, 2: 8, 3: 9, 4: 6, 5: 5, 6: 2, 7: 1, 8: 0, 9: 4, 10: 3, 11: 7, 12: 11, 13: 12, 14: 13, 15: 14 };
    const processFrame = (data) => {
      const values = Object.values(data);
      let i;
      for (i = 0; i < visualValueCount; ++i) {
        const value = values[dataMap[i]] / 255;
        const elmStyles = visualElements[i].style;
        elmStyles.transform = `scaleY( ${value} )`;
        elmStyles.opacity = Math.max(.25, value);
      }
    };

    const processError = () => {
      visualMainElement.classList.add('error');
      visualMainElement.innerText = 'Please allow access to your microphone in order to see this demo.\nNothing bad is going to happen... hopefully :P';
    };

    const onStream = (stream, ctx) => {
      setupAudioStreaming(stream, ctx);
    };

    const a = new AudioVisualizer(audioContext, processFrame, processError, onStream);
  };
</script>

</html>
